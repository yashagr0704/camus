plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

java {
    toolchain {
        // Pins the project to Java 21 regardless of what java/javac happens
        // to be on your PATH. Gradle will fetch a matching JDK if needed.
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'com.kafkaclone.Server'
}

test {
    useJUnitPlatform()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}
